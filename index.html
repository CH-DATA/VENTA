<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --verde: #2fae66;
    --verde-osc: #1f7e49;
    --azul: #1c6fd6;
    --azul-osc: #123a73;
    --oro: #d4af37;
    --oro-suave: #f2d675;
    --amarillo: #ffce33;
    --navy: #0d1526;
    --navy-2: #16233d;
    --tinta: #16232e;
    --papel: #eef2f4;
    --tarjeta: #ffffff;
    --linea: #e3e8ea;
    --rojo: #e14b4b;
    --sombra: 0 10px 30px rgba(13,21,38,0.10);
    --sombra-sm: 0 4px 14px rgba(13,21,38,0.08);
  }

  @keyframes chFadeIn{
    from{opacity:0; transform:translateY(6px);}
    to{opacity:1; transform:translateY(0);}
  }
  @keyframes chShake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-8px);}
    40%{transform:translateX(8px);}
    60%{transform:translateX(-6px);}
    80%{transform:translateX(6px);}
  }
  @keyframes chPulseGlow{
    0%,100%{box-shadow:0 0 0 0 rgba(212,175,55,0.35);}
    50%{box-shadow:0 0 0 8px rgba(212,175,55,0);}
  }
  @keyframes chShimmer{
    0%{background-position:-200% 0;}
    100%{background-position:200% 0;}
  }

  *{box-sizing:border-box;}
  ch-app, .ch-root{all:initial;}

  .ch-root{
    display:block;
    font-family:'Inter',sans-serif;
    color:var(--tinta);
    background:var(--papel);
    min-height:100%;
    padding:0 0 14px 0;
    border-radius:18px;
    overflow:hidden;
  }

  .ch-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    margin:0 0 16px 0;
    flex-wrap:wrap;
    background:linear-gradient(120deg,var(--navy) 0%,var(--navy-2) 60%,#1a3a5c 100%);
    padding:18px 18px;
    position:relative;
    overflow:hidden;
  }
  .ch-header::before{
    content:'';
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 85% -10%, rgba(63,168,69,0.35), transparent 55%),
      radial-gradient(circle at 100% 120%, rgba(28,111,214,0.35), transparent 50%);
    pointer-events:none;
  }
  .ch-header > *{position:relative; z-index:1;}
  .ch-logo{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .ch-logo-badge{
    width:50px;height:50px;border-radius:50%;
    object-fit:cover;
    background:linear-gradient(135deg,var(--verde),var(--azul));
    flex-shrink:0;
    border:2px solid var(--oro-suave);
    box-shadow:0 0 0 3px rgba(212,175,55,0.18), 0 4px 14px rgba(0,0,0,0.35);
  }
  .ch-logo-text{
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size:20px;
    line-height:1.1;
    color:#fff;
    letter-spacing:.01em;
  }
  .ch-logo-text small{
    display:block;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:11px;
    letter-spacing:.08em;
    color:var(--oro-suave);
    text-transform:uppercase;
    opacity:.9;
  }

  .ch-tabs{
    display:flex;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:999px;
    padding:4px;
    gap:4px;
    backdrop-filter:blur(4px);
  }
  .ch-tab{
    border:none;
    background:transparent;
    padding:9px 16px;
    border-radius:999px;
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:13px;
    color:rgba(255,255,255,0.72);
    cursor:pointer;
    transition:all .15s ease;
    white-space:nowrap;
  }
  .ch-tab.active{
    background:linear-gradient(120deg,var(--verde),var(--azul));
    color:#fff;
    box-shadow:0 3px 10px rgba(0,0,0,0.3);
  }

  .ch-body{
    padding:0 14px;
  }

  .ch-card{
    background:var(--tarjeta);
    border:1px solid var(--linea);
    border-radius:16px;
    padding:16px;
    box-shadow:var(--sombra-sm);
    animation:chFadeIn .35s ease;
    margin-bottom:14px;
  }
  .ch-section-title{
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size:15px;
    margin:0 0 10px 0;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .ch-section-title .n{
    background:var(--verde);
    color:#fff;
    width:22px;height:22px;
    border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    font-size:12px;
  }

  .ch-vendedoras{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .ch-chip{
    border:2px solid var(--linea);
    background:#fff;
    padding:9px 14px;
    border-radius:12px;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    color:var(--tinta);
    transition:all .15s ease;
  }
  .ch-chip.sel{
    border-color:var(--azul);
    background:var(--azul);
    color:#fff;
  }

  .ch-productos{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  @media (max-width:480px){
    .ch-productos{grid-template-columns:1fr;}
  }

  .ch-prod{
    border:1px solid var(--linea);
    border-radius:14px;
    padding:12px;
    display:flex;
    flex-direction:column;
    gap:8px;
    background:#fbfdfc;
    transition:box-shadow .2s ease, transform .2s ease, border-color .2s ease;
  }
  .ch-prod:hover{
    box-shadow:var(--sombra-sm);
    border-color:#cfe0d8;
    transform:translateY(-2px);
  }
  .ch-prod-top{
    display:flex;
    align-items:flex-start;
    gap:10px;
  }
  .ch-prod-icon{
    font-size:24px;
    width:44px;height:44px;
    background:linear-gradient(145deg,#ffffff,#eef3f1);
    border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    border:1px solid var(--linea);
    flex-shrink:0;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.7);
  }
  .ch-prod-name{
    font-weight:700;
    font-size:13px;
    line-height:1.25;
  }
  .ch-prod-price{
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    color:var(--verde-osc);
    font-size:14px;
    margin-top:2px;
  }
  .ch-prod-controls{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:auto;
  }
  .ch-qty{
    display:flex;
    align-items:center;
    border:1px solid var(--linea);
    border-radius:10px;
    overflow:hidden;
    background:#fff;
  }
  .ch-qty button{
    border:none;
    background:#eef2f0;
    width:28px;height:30px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    color:var(--tinta);
  }
  .ch-qty span{
    width:28px;
    text-align:center;
    font-weight:700;
    font-size:13px;
  }
  .ch-confirm{
    flex:1;
    border:none;
    background:var(--verde);
    color:#fff;
    font-weight:700;
    font-size:12.5px;
    padding:9px 6px;
    border-radius:10px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:5px;
    transition:transform .1s ease, background .15s ease;
  }
  .ch-confirm:active{transform:scale(0.96);}
  .ch-confirm:disabled{
    background:#c7cfcb;
    cursor:not-allowed;
  }
  .ch-confirm.done{
    background:var(--tinta);
  }

  .ch-toast{
    position:fixed;
    left:50%;
    bottom:18px;
    transform:translateX(-50%) translateY(20px);
    background:linear-gradient(120deg,var(--navy),var(--navy-2));
    color:#fff;
    padding:11px 20px;
    border-radius:999px;
    font-weight:600;
    font-size:13px;
    box-shadow:0 10px 28px rgba(13,21,38,0.35);
    border:1px solid rgba(212,175,55,0.35);
    opacity:0;
    transition:all .25s ease;
    pointer-events:none;
    z-index:50;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .ch-toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  .ch-feed-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 0;
    border-bottom:1px solid var(--linea);
    font-size:13px;
  }
  .ch-feed-item:last-child{border-bottom:none;}
  .ch-feed-check{
    width:22px;height:22px;
    border-radius:6px;
    background:var(--verde);
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    font-size:13px;
  }
  .ch-feed-main{flex:1; min-width:0;}
  .ch-feed-name{font-weight:700;}
  .ch-feed-sub{color:#6b8079; font-size:12px;}
  .ch-feed-amount{
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    color:var(--azul-osc);
    font-size:13.5px;
    white-space:nowrap;
  }
  .ch-feed-del{
    border:none;
    background:transparent;
    color:#c6cbc9;
    font-size:15px;
    cursor:pointer;
    padding:2px 4px;
  }
  .ch-feed-del:hover{color:var(--rojo);}
  .ch-empty{
    color:#8a9a94;
    font-size:13px;
    text-align:center;
    padding:18px 0;
  }

  /* --- Admin view --- */
  .ch-filters{
    display:flex;
    gap:6px;
    margin-bottom:14px;
  }
  .ch-filter-btn{
    border:1px solid var(--linea);
    background:#fff;
    padding:7px 13px;
    border-radius:10px;
    font-weight:700;
    font-size:12.5px;
    cursor:pointer;
    color:#5b7268;
  }
  .ch-filter-btn.active{
    background:var(--tinta);
    border-color:var(--tinta);
    color:#fff;
  }
  .ch-export-btn{
    background:var(--verde);
    border-color:var(--verde);
    color:#fff;
  }
  .ch-export-btn:hover{
    background:var(--verde-osc);
  }

  .ch-kpis{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-bottom:16px;
  }
  @media (max-width:480px){
    .ch-kpis{grid-template-columns:1fr 1fr;}
    .ch-kpis .kpi-wide{grid-column:1/3;}
  }
  .ch-kpi{
    background:linear-gradient(160deg,#ffffff, #f7faf9);
    border:1px solid var(--linea);
    border-radius:14px;
    padding:14px;
    box-shadow:var(--sombra-sm);
    position:relative;
    overflow:hidden;
  }
  .ch-kpi::before{
    content:'';
    position:absolute;
    top:0;left:0;right:0;
    height:3px;
    background:linear-gradient(90deg,var(--azul),var(--verde));
  }
  .ch-kpi .icon{
    font-size:16px;
    margin-bottom:6px;
    display:inline-block;
  }
  .ch-kpi .label{
    font-size:10.5px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:#7c8f88;
    margin-bottom:4px;
  }
  .ch-kpi .value{
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size:21px;
    color:var(--navy);
  }
  .ch-kpi .sub{
    font-size:11px;
    color:#7c8f88;
    margin-top:2px;
  }

  .ch-podium{
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .ch-vendor-row{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .ch-medal{
    width:32px;height:32px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:800;
    font-size:13px;
    color:#fff;
    flex-shrink:0;
    box-shadow:0 3px 8px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.4);
    border:1px solid rgba(255,255,255,0.5);
  }
  .ch-vendor-info{
    width:84px;
    flex-shrink:0;
    font-weight:700;
    font-size:12.5px;
  }
  .ch-bar-track{
    flex:1;
    background:#eef2f0;
    border-radius:8px;
    height:28px;
    position:relative;
    overflow:hidden;
    box-shadow:inset 0 1px 3px rgba(0,0,0,0.06);
  }
  .ch-bar-fill{
    height:100%;
    border-radius:8px;
    background:linear-gradient(90deg,var(--azul),var(--verde));
    display:flex;
    align-items:center;
    justify-content:flex-end;
    padding-right:8px;
    transition:width .6s cubic-bezier(.2,.8,.2,1);
    min-width:36px;
    position:relative;
    overflow:hidden;
  }
  .ch-bar-fill.top::after{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(100deg, transparent 30%, rgba(255,255,255,0.35) 45%, transparent 60%);
    background-size:250% 100%;
    animation:chShimmer 2.6s ease-in-out infinite;
  }
  .ch-bar-fill span{
    color:#fff;
    font-size:11.5px;
    font-weight:700;
    white-space:nowrap;
    position:relative;
    z-index:1;
  }

  .ch-table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
  }
  .ch-table th{
    text-align:left;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:.05em;
    color:#7c8f88;
    padding:8px 6px;
    border-bottom:2px solid var(--linea);
    background:#f7faf9;
  }
  .ch-table td{
    padding:10px 6px;
    border-bottom:1px solid var(--linea);
  }
  .ch-table tr:nth-child(even) td{background:#fafcfb;}
  .ch-table tr:hover td{background:#f0f6f3;}
  .ch-table tr:last-child td{border-bottom:none;}
  .ch-table td.num, .ch-table th.num{text-align:right; font-variant-numeric:tabular-nums;}


  .ch-loading{
    text-align:center;
    padding:30px 0;
    color:#7c8f88;
    font-size:13px;
  }

  .ch-lock-wrap{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:34px 16px;
    animation:chFadeIn .4s ease;
  }
  .ch-lock-card{
    width:100%;
    max-width:340px;
    background:linear-gradient(160deg,var(--navy),var(--navy-2));
    border-radius:20px;
    padding:30px 24px;
    text-align:center;
    box-shadow:0 20px 45px rgba(13,21,38,0.25);
    position:relative;
    overflow:hidden;
  }
  .ch-lock-card::before{
    content:'';
    position:absolute;
    inset:0;
    background:radial-gradient(circle at 20% 0%, rgba(212,175,55,0.18), transparent 55%);
    pointer-events:none;
  }
  .ch-lock-icon{
    width:58px;height:58px;
    border-radius:50%;
    margin:0 auto 14px auto;
    display:flex;align-items:center;justify-content:center;
    font-size:26px;
    background:radial-gradient(circle, rgba(212,175,55,0.25), rgba(212,175,55,0.05));
    border:1px solid rgba(212,175,55,0.4);
    animation:chPulseGlow 2.4s ease-in-out infinite;
    position:relative;
    z-index:1;
  }
  .ch-lock-title{
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size:19px;
    color:#fff;
    margin-bottom:4px;
    position:relative;
    z-index:1;
  }
  .ch-lock-sub{
    font-size:12.5px;
    color:rgba(255,255,255,0.6);
    margin-bottom:20px;
    position:relative;
    z-index:1;
  }
  .ch-lock-input{
    width:100%;
    padding:12px 14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.18);
    background:rgba(255,255,255,0.07);
    color:#fff;
    font-size:15px;
    letter-spacing:.1em;
    text-align:center;
    outline:none;
    position:relative;
    z-index:1;
    transition:border-color .2s ease, background .2s ease;
  }
  .ch-lock-input::placeholder{
    color:rgba(255,255,255,0.35);
    letter-spacing:normal;
  }
  .ch-lock-input:focus{
    border-color:var(--oro-suave);
    background:rgba(255,255,255,0.11);
  }
  .ch-lock-input.error{
    animation:chShake .4s ease;
    border-color:var(--rojo);
  }
  .ch-lock-btn{
    width:100%;
    margin-top:12px;
    border:none;
    padding:12px;
    border-radius:12px;
    background:linear-gradient(120deg,var(--oro),var(--oro-suave));
    color:var(--navy);
    font-weight:800;
    font-size:14px;
    cursor:pointer;
    position:relative;
    z-index:1;
    transition:transform .1s ease, filter .15s ease;
  }
  .ch-lock-btn:hover{filter:brightness(1.06);}
  .ch-lock-btn:active{transform:scale(0.97);}
  .ch-lock-error{
    margin-top:12px;
    font-size:12px;
    color:#ff8a8a;
    min-height:16px;
    position:relative;
    z-index:1;
  }
  .ch-lock-back{
    margin-top:14px;
    background:none;
    border:none;
    color:rgba(255,255,255,0.45);
    font-size:12px;
    cursor:pointer;
    text-decoration:underline;
    position:relative;
    z-index:1;
  }

  .ch-panel-topbar{
    display:flex;
    justify-content:flex-end;
    margin-bottom:4px;
  }
  .ch-lock-again{
    background:none;
    border:none;
    color:#9aa8a3;
    font-size:12px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:4px;
  }
  .ch-lock-again:hover{color:var(--tinta);}
</style>

<div class="ch-root" id="chRoot">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
(function(){
  const PRODUCTOS = [
    {id:'sensor', nombre:'Altavoz Inalámbrico con Sensor', precio:45, icono:'🔊'},
    {id:'soporte', nombre:'Soporte Metálico para Celular', precio:10, icono:'📱'},
    {id:'altavoz_soporte', nombre:'Altavoz Inalámbrico con Soporte', precio:45, icono:'🎵'},
    {id:'calefactor', nombre:'Calefactor Eléctrico', precio:52, icono:'🔥'},
    {id:'cargador_turbo', nombre:'Cargador Romax Turbo Power', precio:26, icono:'🔌'},
    {id:'cargador_200w', nombre:'Cargador Super 200W', precio:39, icono:'⚡'},
    {id:'audifonos_bass', nombre:'Audífonos Romax Extra Bass', precio:22, icono:'🎧'},
    {id:'powerbank_20000', nombre:'Cargador Portátil 20000mAh 25W', precio:50, icono:'🔋'},
  ];
  const VENDEDORAS = ['MERGILDA','ROCIO','ISABEL C','OLINDA'];
  const STORAGE_KEY = 'ch_ventas_registro';

  let ventas = [];
  let vendedoraActual = null;
  let cantidades = {};
  PRODUCTOS.forEach(p => cantidades[p.id] = 1);
  let filtroPanel = 'todo'; // hoy | semana | todo
  let cargado = false;
  const CLAVE_PANEL = 'SHANDALA';
  let panelDesbloqueado = false;

  const root = document.getElementById('chRoot');
  const elVender = document.getElementById('chVender');
  const elPanel = document.getElementById('chPanel');
  const elToast = document.getElementById('chToast');

  function fmt(n){
    return 'S/ ' + n.toFixed(2);
  }

  function showToast(msg, icon){
    elToast.innerHTML = (icon||'✅') + ' ' + msg;
    elToast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=> elToast.classList.remove('show'), 2200);
  }

  async function cargarVentas(){
    try{
      const res = await window.storage.get(STORAGE_KEY, true);
      ventas = res && res.value ? JSON.parse(res.value) : [];
    }catch(e){
      ventas = [];
    }
    cargado = true;
  }

  async function guardarVentas(){
    try{
      await window.storage.set(STORAGE_KEY, JSON.stringify(ventas), true);
    }catch(e){
      showToast('No se pudo guardar. Intenta de nuevo.', '⚠️');
    }
  }

  function tabSwitch(tab){
    document.querySelectorAll('.ch-tab').forEach(b=>{
      b.classList.toggle('active', b.dataset.tab === tab);
    });
    elVender.style.display = tab === 'vender' ? 'block' : 'none';
    elPanel.style.display = tab === 'panel' ? 'block' : 'none';
    if(tab === 'panel') renderPanel();
  }

  root.querySelectorAll('.ch-tab').forEach(btn=>{
    btn.addEventListener('click', ()=> tabSwitch(btn.dataset.tab));
  });

  function renderVender(){
    if(!cargado){
      elVender.innerHTML = '<div class="ch-loading">Cargando…</div>';
      return;
    }

    let html = '';

    html += '<div class="ch-card">';
    html += '<div class="ch-section-title"><span class="n">1</span> ¿Quién eres?</div>';
    html += '<div class="ch-vendedoras">';
    VENDEDORAS.forEach(v=>{
      html += `<button class="ch-chip ${v===vendedoraActual?'sel':''}" data-vend="${v}">${v}</button>`;
    });
    html += '</div></div>';

    html += '<div class="ch-card">';
    html += '<div class="ch-section-title"><span class="n">2</span> Marca lo que vendiste</div>';
    html += '<div class="ch-productos">';
    PRODUCTOS.forEach(p=>{
      const qty = cantidades[p.id];
      html += `
        <div class="ch-prod">
          <div class="ch-prod-top">
            <div class="ch-prod-icon">${p.icono}</div>
            <div>
              <div class="ch-prod-name">${p.nombre}</div>
              <div class="ch-prod-price">${fmt(p.precio)}</div>
            </div>
          </div>
          <div class="ch-prod-controls">
            <div class="ch-qty">
              <button data-qty-minus="${p.id}">−</button>
              <span>${qty}</span>
              <button data-qty-plus="${p.id}">+</button>
            </div>
            <button class="ch-confirm" data-confirm="${p.id}" ${vendedoraActual?'':'disabled'}>
              ✔ Vendido
            </button>
          </div>
        </div>`;
    });
    html += '</div></div>';

    const hoy = new Date().toDateString();
    const ventasHoy = ventas.filter(v => new Date(v.fecha).toDateString() === hoy)
      .sort((a,b)=> new Date(b.fecha) - new Date(a.fecha));

    html += '<div class="ch-card">';
    html += `<div class="ch-section-title">📋 Ventas de hoy (${ventasHoy.length})</div>`;
    if(ventasHoy.length === 0){
      html += '<div class="ch-empty">Aún no hay ventas registradas hoy.</div>';
    }else{
      ventasHoy.slice(0,20).forEach(v=>{
        const hora = new Date(v.fecha).toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});
        html += `
          <div class="ch-feed-item">
            <div class="ch-feed-check">✔</div>
            <div class="ch-feed-main">
              <div class="ch-feed-name">${v.producto} ${v.cantidad>1 ? '×'+v.cantidad : ''}</div>
              <div class="ch-feed-sub">${v.vendedora} · ${hora}</div>
            </div>
            <div class="ch-feed-amount">${fmt(v.subtotal)}</div>
            <button class="ch-feed-del" data-del="${v.id}" title="Eliminar">✕</button>
          </div>`;
      });
    }
    html += '</div>';

    elVender.innerHTML = html;

    elVender.querySelectorAll('[data-vend]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        vendedoraActual = btn.dataset.vend;
        renderVender();
      });
    });
    elVender.querySelectorAll('[data-qty-minus]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = btn.dataset.qtyMinus;
        cantidades[id] = Math.max(1, cantidades[id]-1);
        renderVender();
      });
    });
    elVender.querySelectorAll('[data-qty-plus]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = btn.dataset.qtyPlus;
        cantidades[id] = Math.min(99, cantidades[id]+1);
        renderVender();
      });
    });
    elVender.querySelectorAll('[data-confirm]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        if(!vendedoraActual) return;
        const id = btn.dataset.confirm;
        const prod = PRODUCTOS.find(p=>p.id===id);
        const cantidad = cantidades[id];
        const venta = {
          id: 'v_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
          vendedora: vendedoraActual,
          producto: prod.nombre,
          precio: prod.precio,
          cantidad: cantidad,
          subtotal: prod.precio * cantidad,
          fecha: new Date().toISOString()
        };
        btn.disabled = true;
        btn.classList.add('done');
        btn.innerHTML = '✔ Guardado';
        ventas.push(venta);
        await guardarVentas();
        cantidades[id] = 1;
        showToast(`Venta registrada: ${prod.nombre}`, '🎉');
        setTimeout(renderVender, 500);
      });
    });
    elVender.querySelectorAll('[data-del]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const id = btn.dataset.del;
        ventas = ventas.filter(v=>v.id !== id);
        await guardarVentas();
        renderVender();
      });
    });
  }

  function filtrarVentas(){
    if(filtroPanel === 'todo') return ventas;
    const ahora = new Date();
    return ventas.filter(v=>{
      const f = new Date(v.fecha);
      if(filtroPanel === 'hoy'){
        return f.toDateString() === ahora.toDateString();
      }
      if(filtroPanel === 'semana'){
        const diff = (ahora - f) / (1000*60*60*24);
        return diff <= 7;
      }
      return true;
    });
  }

  function renderLockScreen(errorMsg){
    elPanel.innerHTML = `
      <div class="ch-lock-wrap">
        <div class="ch-lock-card">
          <div class="ch-lock-icon">🔒</div>
          <div class="ch-lock-title">Acceso restringido</div>
          <div class="ch-lock-sub">Ingresa la clave para ver la productividad</div>
          <input type="password" id="chLockInput" class="ch-lock-input ${errorMsg?'error':''}" placeholder="Clave de acceso" autocomplete="off" />
          <button class="ch-lock-btn" id="chLockBtn">Ingresar</button>
          <div class="ch-lock-error">${errorMsg ? errorMsg : ''}</div>
        </div>
      </div>`;

    const input = document.getElementById('chLockInput');
    const btn = document.getElementById('chLockBtn');
    input.focus();

    function intentar(){
      const val = (input.value || '').trim().toUpperCase();
      if(val === CLAVE_PANEL){
        panelDesbloqueado = true;
        showToast('Acceso concedido', '🔓');
        renderPanel();
      }else{
        renderLockScreen('Clave incorrecta. Intenta de nuevo.');
      }
    }

    btn.addEventListener('click', intentar);
    input.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter') intentar();
    });
  }

  function renderPanel(){
    if(!panelDesbloqueado){
      renderLockScreen();
      return;
    }
    if(!cargado){
      elPanel.innerHTML = '<div class="ch-loading">Cargando…</div>';
      return;
    }

    const datos = filtrarVentas();
    const totalVentas = datos.reduce((s,v)=>s+v.cantidad,0);
    const totalIngresos = datos.reduce((s,v)=>s+v.subtotal,0);

    const porVendedora = {};
    VENDEDORAS.forEach(v=> porVendedora[v] = {unidades:0, ingresos:0});
    datos.forEach(v=>{
      if(!porVendedora[v.vendedora]) porVendedora[v.vendedora] = {unidades:0, ingresos:0};
      porVendedora[v.vendedora].unidades += v.cantidad;
      porVendedora[v.vendedora].ingresos += v.subtotal;
    });
    const rankingVendedoras = Object.entries(porVendedora)
      .sort((a,b)=> b[1].ingresos - a[1].ingresos);
    const maxIngreso = Math.max(1, ...rankingVendedoras.map(r=>r[1].ingresos));
    const topVendedora = rankingVendedoras[0] && rankingVendedoras[0][1].ingresos > 0
      ? rankingVendedoras[0][0] : '—';

    const porProducto = {};
    PRODUCTOS.forEach(p=> porProducto[p.nombre] = {unidades:0, ingresos:0});
    datos.forEach(v=>{
      if(!porProducto[v.producto]) porProducto[v.producto] = {unidades:0, ingresos:0};
      porProducto[v.producto].unidades += v.cantidad;
      porProducto[v.producto].ingresos += v.subtotal;
    });

    const medallas = ['linear-gradient(145deg,#ffd76a,#c9931a)','linear-gradient(145deg,#e2e6e9,#9aa3ab)','linear-gradient(145deg,#e8a86b,#a86a35)'];
    const medallasLabel = ['1','2','3'];

    let html = '';

    html += '<div class="ch-panel-topbar"><button class="ch-lock-again" id="chLockAgain">🔒 Bloquear panel</button></div>';

    html += '<div class="ch-filters">';
    [['hoy','Hoy'],['semana','7 días'],['todo','Todo']].forEach(([key,label])=>{
      html += `<button class="ch-filter-btn ${filtroPanel===key?'active':''}" data-filtro="${key}">${label}</button>`;
    });
    html += `<button class="ch-filter-btn ch-export-btn" id="chExportBtn" style="margin-left:auto;">⬇️ Descargar Excel</button>`;
    html += '</div>';

    html += '<div class="ch-kpis">';
    html += `<div class="ch-kpi"><div class="icon">📦</div><div class="label">Unidades vendidas</div><div class="value">${totalVentas}</div></div>`;
    html += `<div class="ch-kpi"><div class="icon">💰</div><div class="label">Ingresos</div><div class="value">${fmt(totalIngresos)}</div></div>`;
    html += `<div class="ch-kpi"><div class="icon">👑</div><div class="label">Top vendedora</div><div class="value" style="font-size:15px;">${topVendedora}</div></div>`;
    html += '</div>';

    html += '<div class="ch-card">';
    html += '<div class="ch-section-title">🏆 Ranking de vendedoras</div>';
    html += '<div class="ch-podium">';
    rankingVendedoras.forEach(([nombre, d], i)=>{
      const pct = Math.max(6, Math.round((d.ingresos/maxIngreso)*100));
      const color = i < 3 ? medallas[i] : '#9fb0aa';
      const medalla = i < 3 ? medallasLabel[i] : (i+1);
      html += `
        <div class="ch-vendor-row">
          <div class="ch-medal" style="background:${color};">${medalla}</div>
          <div class="ch-vendor-info">${nombre}</div>
          <div class="ch-bar-track">
            <div class="ch-bar-fill ${i===0?'top':''}" style="width:${pct}%;">
              <span>${fmt(d.ingresos)} · ${d.unidades}u</span>
            </div>
          </div>
        </div>`;
    });
    html += '</div></div>';

    html += '<div class="ch-card">';
    html += '<div class="ch-section-title">📦 Ventas por producto</div>';
    html += '<table class="ch-table"><thead><tr><th>Producto</th><th class="num">Unidades</th><th class="num">Ingresos</th></tr></thead><tbody>';
    Object.entries(porProducto)
      .sort((a,b)=> b[1].ingresos - a[1].ingresos)
      .forEach(([nombre,d])=>{
        html += `<tr><td>${nombre}</td><td class="num">${d.unidades}</td><td class="num">${fmt(d.ingresos)}</td></tr>`;
      });
    html += '</tbody></table></div>';

    elPanel.innerHTML = html;

    elPanel.querySelectorAll('[data-filtro]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        filtroPanel = btn.dataset.filtro;
        renderPanel();
      });
    });

    const btnExport = document.getElementById('chExportBtn');
    if(btnExport){
      btnExport.addEventListener('click', ()=> exportarExcel(datos, porVendedora, porProducto, totalVentas, totalIngresos));
    }

    const btnLockAgain = document.getElementById('chLockAgain');
    if(btnLockAgain){
      btnLockAgain.addEventListener('click', ()=>{
        panelDesbloqueado = false;
        renderPanel();
      });
    }
  }

  function exportarExcel(datos, porVendedora, porProducto, totalVentas, totalIngresos){
    if(typeof XLSX === 'undefined'){
      showToast('No se pudo cargar Excel. Revisa tu conexión.', '⚠️');
      return;
    }
    if(datos.length === 0){
      showToast('No hay ventas para exportar en este filtro.', '⚠️');
      return;
    }

    // Hoja 1: detalle de cada venta
    const filas = datos
      .slice()
      .sort((a,b)=> new Date(a.fecha) - new Date(b.fecha))
      .map(v=>({
        'Fecha': new Date(v.fecha).toLocaleDateString('es-PE'),
        'Hora': new Date(v.fecha).toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'}),
        'Vendedora': v.vendedora,
        'Producto': v.producto,
        'Precio unitario (S/)': v.precio,
        'Cantidad': v.cantidad,
        'Subtotal (S/)': v.subtotal
      }));

    // Hoja 2: resumen por vendedora
    const resumenVend = Object.entries(porVendedora)
      .sort((a,b)=> b[1].ingresos - a[1].ingresos)
      .map(([nombre,d])=>({
        'Vendedora': nombre,
        'Unidades vendidas': d.unidades,
        'Ingresos (S/)': d.ingresos
      }));
    resumenVend.push({'Vendedora':'TOTAL','Unidades vendidas':totalVentas,'Ingresos (S/)':totalIngresos});

    // Hoja 3: resumen por producto
    const resumenProd = Object.entries(porProducto)
      .sort((a,b)=> b[1].ingresos - a[1].ingresos)
      .map(([nombre,d])=>({
        'Producto': nombre,
        'Unidades vendidas': d.unidades,
        'Ingresos (S/)': d.ingresos
      }));

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(filas), 'Detalle de ventas');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(resumenVend), 'Por vendedora');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(resumenProd), 'Por producto');

    const etiquetaFiltro = filtroPanel === 'hoy' ? 'hoy' : filtroPanel === 'semana' ? '7dias' : 'todo';
    const fechaArchivo = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, `CH_Tecnologia_ventas_${etiquetaFiltro}_${fechaArchivo}.xlsx`);
    showToast('Excel descargado', '⬇️');
  }

  (async function init(){
    renderVender();
    await cargarVentas();
    renderVender();
  })();
})();
</script>
